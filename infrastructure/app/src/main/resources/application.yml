management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"

spring:
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP:market-aggregation-service}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${APP_SCHEMA_REGISTRY_URL:http://localhost:8081}
        specific.avro.reader: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${APP_SCHEMA_REGISTRY_URL:http://localhost:8081}

app:
  kafka:
    topics:
      trades: ${APP_KAFKA_TOPIC_TRADES:canonical.market.trade.v1}
      bars: ${APP_KAFKA_TOPIC_BARS:market.bar.v1}

aggregation:
  partial-publish-interval-ms: ${AGGREGATION_PARTIAL_PUBLISH_INTERVAL_MS:1000}
  late-trade-policy: ${AGGREGATION_LATE_TRADE_POLICY:IGNORE}